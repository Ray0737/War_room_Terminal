<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATEGIC COMMAND | Auth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/janyas/line-seed-sans-th@latest/line-seed-sans-th.css');
        @import url('https://bit.ly/3CZa0Sz');
        @import url('https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css');

        :root {
            --red: #ff3e3e;
            --white-glass: rgba(255, 255, 255, 0.08);
            --white-border: rgba(255, 255, 255, 0.12);
            --font-main: 'line_seed_sans_th', sans-serif;
        }

        body {
            background: #000;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('pic/bg4.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            /* Keeps bg steady */

            /* Change flex behavior */
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            /* Stack vertically */
            color: white;
            font-family: var(--font-main);
            overflow-x: hidden;
            /* Allow vertical scroll if content is tall */
        }


        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--white-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--white-border);
            border-radius: 5px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            margin: auto;
            display: flex;
            flex-direction: column;
            text-align: center;
            margin: auto;
        }

        .system-id {
            font-size: 1rem;
            color: white;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        #authTitle {
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.9);
        }

        .intel-input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--white-border) !important;
            border-radius: 2px !important;
            color: white !important;
            font-size: 0.85rem !important;
            padding: 10px 18px !important;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .intel-input:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: rgba(255, 255, 255, 0.4) !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05) !important;
            transform: translateY(-1px);
        }

        .intel-input::placeholder {
            color: rgba(255, 255, 255, 0.3) !important;
        }

        .btn-primary-custom {
            background: #fff;
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 10px;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .btn-primary-custom:hover {
            background: var(--red);
            color: white;
            transform: scale(1.02);
        }

        .btn-toggle {
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            margin-top: 20px;
            transition: 0.2s;
        }

        .btn-toggle:hover {
            color: #fff;
        }

        .footer-label {
            position: absolute;
            bottom: 30px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .hidden {
            display: none !important;
        }

        /* Modal styling */
        .modal-content {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--white-border);
            border-radius: 20px;
        }

        footer {
            width: 100%;
            backdrop-filter: blur(2px);
            /* Forces the white look you had */
            color: white;
            margin-top: auto;
            /* Pushes the footer to the very bottom */
            flex-shrink: 0;
        }

        /* Nav Bar Styling */
        .navbar-custom {
            background: transparent;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand-custom {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: white !important;
            text-decoration: none;
        }

        .nav-link-custom {
            color: rgba(255, 255, 255, 0.7) !important;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-left: 25px;
        }

        .nav-link-custom:hover {
            color: white !important;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <div class="system-id">Strategic Command</div>
        <h2 id="authTitle">Terminal Authentication</h2>

        <div id="authForm">
            <div id="usernameField" class="mb-2 hidden">
                <input type="text" id="regUser" class="form-control intel-input" placeholder="Callsign ID">
            </div>

            <div class="mb-2">
                <input type="email" id="authEmail" class="form-control intel-input" placeholder="Email Address">
            </div>

            <div class="mb-3">
                <input type="password" id="authPass" class="form-control intel-input" placeholder="Encryption Key">
            </div>

            <div class="d-grid">
                <button id="primaryBtn" class="btn btn-primary-custom">Establish Link</button>
                <button id="toggleBtn" class="btn btn-toggle" onclick="toggleMode()">+ Register New Unit</button>
            </div>
        </div>

        <div id="errorMsg" class="mt-3 text-danger d-none" style="font-size: 0.75rem;"></div>
    </div>

    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center p-5">
                    <p class="text-white mb-4" style="font-size: 0.9rem; letter-spacing: 4px;">ACCESS_GRANTED</p>
                    <div class="spinner-border text-light" role="status" style="width: 1.5rem; height: 1.5rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-5">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start">
                    <h6 class="fw-bold mb-1">Created by</h6>
                    <p class="text-white mb-0">Mr. Raphee Rattanamanoonporn "Ray"</p>
                    <small class="text-secondary">E-AI Major (Gen 07) @ Satit PSM</small>
                </div>
                <div class="col-md-6 text-center text-md-end mt-4 mt-md-0">
                    <div class="d-flex justify-content-center justify-content-md-end gap-3">
                        <a href="https://profilewebsiteprojecttrack.vercel.app/proj.html"
                            class="btn btn-outline-warning btn-sm rounded-pill px-3">
                            <i class="bi bi-file-earmark-bar-graph-fill me-2"></i>Projects
                        </a>
                        <a href="https://github.com/Ray0737" target="_blank"
                            class="btn btn-outline-warning btn-sm rounded-pill px-3">
                            <i class="bi bi-github me-2"></i>GitHub
                        </a>
                    </div>
                </div>
            </div>
            <div class="row mt-4">
                <div class="col-12 text-center">
                    <p class="text-secondary small mb-0">&copy; 2026 Strategic Command. All Rights Reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>

    <script>
        let isRegisterMode = false;
        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            const title = document.getElementById('authTitle');
            const userField = document.getElementById('usernameField');
            const primaryBtn = document.getElementById('primaryBtn');
            const toggleBtn = document.getElementById('toggleBtn');
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.classList.add('d-none');

            if (isRegisterMode) {
                title.innerText = "Unit Registration";
                userField.classList.remove('hidden');
                primaryBtn.innerText = "Initialize Unit";
                toggleBtn.innerText = "Back to Login";
            } else {
                title.innerText = "Terminal Authentication";
                userField.classList.add('hidden');
                primaryBtn.innerText = "Establish Link";
                toggleBtn.innerText = "+ Register New Unit";
            }
        }
    </script>
</body>

</html>
